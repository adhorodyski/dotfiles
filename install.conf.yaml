- defaults:
    link:
      relink: true
      create: true

- clean: ['~', '~/.config']

- link:
    ~/.gitconfig: .gitconfig
    ~/.zshrc: .zshrc
    ~/.config/ghostty: .config/ghostty
    ~/.config/nvim: .config/nvim

- shell:
  - command: ./scripts/bootstrap.sh
    description: install packages, oh-my-zsh, theme + plugins
    stdin: true
    stdout: true
    stderr: true
